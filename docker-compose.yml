services:
  slate:
    build: .
    image: slate:latest
    pull_policy: build
    container_name: slate
    restart: unless-stopped
    ports:
      - "5147:5147"
    volumes:
      - ${SLATE_VAULT_PATH}:/vault:rw
    environment:
      SLATE_VAULT_PATH: /vault
      SLATE_HOST: 0.0.0.0
      SLATE_PORT: 5147
      SLATE_READONLY: "false"
      PUID: 1000
      PGID: 1000
